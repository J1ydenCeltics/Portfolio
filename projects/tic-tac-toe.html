<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Tic Tac Toe Game</title>
<link rel="stylesheet" href="../../css/project-styles.css" />
<style>
  #board { display: grid; grid-template-columns: repeat(3, 100px); gap: 5px; margin: 20px auto; }
  .cell { width: 100px; height: 100px; font-size: 2em; display:flex; align-items:center; justify-content:center; border: 2px solid #00ff7f; cursor:pointer; background-color: #1c1c1c; color: #e0e0e0; transition: background-color 0.2s ease; }
  .cell:hover { background-color: #333; }
  #status { text-align: center; font-weight: bold; margin-top: 15px; color: #00ff7f; }
</style>
</head>
<body>
<h1 style="text-align:center; color:#00ff7f;">Tic Tac Toe Game</h1>

<div id="board">
  <div class="cell" data-index="0"></div>
  <div class="cell" data-index="1"></div>
  <div class="cell" data-index="2"></div>
  <div class="cell" data-index="3"></div>
  <div class="cell" data-index="4"></div>
  <div class="cell" data-index="5"></div>
  <div class="cell" data-index="6"></div>
  <div class="cell" data-index="7"></div>
  <div class="cell" data-index="8"></div>
</div>

<p id="status">Turn: X</p>

<script src="tic-tac-toe.js"></script>
</body>
</html>
