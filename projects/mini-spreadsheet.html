<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini Spreadsheet</title>
<link rel="stylesheet" href="/css/project-styles.css">
</head>
<body>
<h1>Mini Spreadsheet</h1>

<div id="spreadsheet-container">
    <p id="instructions">Enter numbers below and click a button to calculate sum or average.</p>
    <table id="spreadsheet">
        <tr>
            <td><input type="number" value="0"></td>
            <td><input type="number" value="0"></td>
            <td><input type="number" value="0"></td>
        </tr>
        <tr>
            <td><input type="number" value="0"></td>
            <td><input type="number" value="0"></td>
            <td><input type="number" value="0"></td>
        </tr>
        <tr>
            <td><input type="number" value="0"></td>
            <td><input type="number" value="0"></td>
            <td><input type="number" value="0"></td>
        </tr>
    </table>
    <button id="sum-btn">Calculate Sum</button>
    <button id="avg-btn">Calculate Average</button>
    <p id="result">Result will appear here</p>
</div>

<script src="mini-spreadsheet.js"></script>
</body>
</html>
