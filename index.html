<!DOCTYPE html>
<html>
<head>
    <title>Jayden Yousuf - Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #0d1117;
            color: #c9d1d9;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }
        a { color: #39ff14; text-decoration: none; }
        a:hover { text-decoration: underline; }
        h1, h2, h3 { color: #39ff14; }
        nav { background: #161b22; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        nav a { margin: 0 15px; font-weight: bold; }
        nav a:hover { text-decoration: underline; }
        header { text-align: center; padding: 60px 20px; }
        section { max-width: 900px; margin: auto; padding: 40px 20px; }

        /* About section */
        .about-container {
            display: flex;
            align-items: flex-start;
            gap: 30px;
            flex-wrap: wrap;
        }
        .about-container img {
            width: 250px;
            border-radius: 12px;
        }
        .about-text {
            flex: 1;
        }
        @media (max-width: 700px) {
            .about-container {
                flex-direction: column;
                align-items: center;
            }
            .about-container img {
                width: 200px;
                margin-bottom: 20px;
            }
            .about-text {
                text-align: center;
            }
        }

        .card-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #161b22; padding: 20px; border-radius: 12px; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; position: relative; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 0 15px #39ff14; }
        .card img { width: 100%; border-radius: 8px; transition: transform 0.2s; }
        .card img:hover { transform: scale(1.05); }

        .skills { display: flex; flex-wrap: wrap; gap: 15px; }
        .skill { background: #161b22; padding: 8px 12px; border-radius: 6px; font-weight: bold; transition: background 0.2s, transform 0.2s; cursor: pointer; }
        .skill:hover { background: #39ff14; color: #0d1117; transform: scale(1.1); }

        footer { text-align: center; padding: 20px; background: #161b22; }
        .modal { display: none; position: fixed; z-index: 2000; padding-top: 60px; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.9); }
        .modal-content { background-color: #0d1117; margin: auto; padding: 20px; border-radius: 12px; width: 80%; max-width: 700px; color: #c9d1d9; text-align: center; }
        .close { color: #39ff14; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close:hover { color: #c9d1d9; }

        .tic-tac-toe, .calculator, .spreadsheet { display: grid; justify-content: center; margin: 20px 0; }
        .tic-tac-toe { grid-template-columns: repeat(3, 80px); grid-gap: 10px; }
