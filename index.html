<section id="projects">
    <h3>Projects</h3>
    <div class="card-container">
        <div class="card" onclick="openModal('Python Calculator', 'calc')">
            <img src="https://via.placeholder.com/400" alt="Python Calculator">
            <h4>Python Calculator</h4>
        </div>
        <div class="card" onclick="openModal('Tic-Tac-Toe', 'tic')">
            <img src="https://via.placeholder.com/400" alt="Tic-Tac-Toe">
            <h4>Tic-Tac-Toe Game</h4>
        </div>
        <div class="card" onclick="openModal('Password Generator', 'pass')">
            <img src="https://via.placeholder.com/400" alt="Password Generator">
            <h4>Password Generator</h4>
        </div>
        <div class="card" onclick="openModal('Simple Quiz', 'quiz')">
            <img src="https://via.placeholder.com/400" alt="Quiz Game">
            <h4>Simple Quiz Game</h4>
        </div>
        <div class="card" onclick="openModal('Mini Spreadsheet', 'sheet')">
            <img src="https://via.placeholder.com/400" alt="Mini Spreadsheet">
            <h4>Mini Spreadsheet</h4>
        </div>
        <div class="card" onclick="openModal('Profile Card Maker', 'profile')">
            <img src="https://via.placeholder.com/400" alt="Profile Card Maker">
            <h4>Profile Card Maker</h4>
        </div>
    </div>
</section>

<div id="projectModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h3 id="modalTitle"></h3>
        <div id="modalBody"></div>
    </div>
</div>

<script>
const modal = document.getElementById('projectModal');
const modalTitle = document.getElementById('modalTitle');
const modalBody = document.getElementById('modalBody');

function openModal(title, type) {
    modalTitle.innerText = title;
    modalBody.innerHTML = '';
    
    if(type === 'calc'){
        const input = document.createElement('input'); input.type='text'; input.id='calcInput'; input.placeholder='0';
        const keys = ['7','8','9','/','4','5','6','*','1','2','3','-','0','.','=','+'];
        const container = document.createElement('div'); container.className='calculator';
        container.appendChild(input);
        keys.forEach(k=>{
            const btn = document.createElement('button');
            btn.innerText = k;
            btn.onclick = () => {
                if(k==='='){
                    try{ input.value = eval(input.value); } 
                    catch(e){ input.value='Error'; }
                } else { input.value += k; }
            };
            container.appendChild(btn);
        });
        modalBody.appendChild(container);
    }

    if(type === 'tic'){
        const board = document.createElement('div'); board.className='tic-tac-toe';
        let turn='X';
        for(let i=0;i<9;i++){
            const btn = document.createElement('button');
            btn.onclick = () => { if(btn.innerText===''){ btn.innerText=turn; turn = turn==='X'?'O':'X'; } };
            board.appendChild(btn);
        }
        modalBody.appendChild(board);
    }

    if(type === 'pass'){
        const btn = document.createElement('button'); btn.innerText='Generate Password';
        const output = document.createElement('p'); output.style.marginTop='15px';
        btn.onclick = () => {
            const chars='abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()';
            let pw=''; for(let i=0;i<12;i++){ pw += chars[Math.floor(Math.random()*chars.length)]; }
            output.innerText = pw;
        };
        modalBody.appendChild(btn); modalBody.appendChild(output);
    }

    if(type === 'quiz'){
        const quiz = [
            {q:"What does Python mainly do?",options:["Cooking","Programming","Painting","Dancing"],answer:1},
            {q:"A good cybersecurity practice is?",options:["Strong passwords","Sharing passwords","Ignoring updates","Clicking unknown links"],answer:0},
            {q:"Which tag creates a paragraph in HTML?",options:["<p>","<div>","<h1>","<span>"],answer:0}
        ];
        let current=0, score=0;
        const container = document.createElement('div'); container.className='quiz-container';
        const showQuestion = () => {
            container.innerHTML='';
            if(current>=quiz.length){ container.innerHTML=`<h4>Quiz Complete! Score: ${score}/${quiz.length}</h4>`; return; }
            const q = document.createElement('p'); q.innerText = quiz[current].q; container.appendChild(q);
            quiz[current].options.forEach((opt,i)=>{
                const btn=document.createElement('button'); btn.innerText=opt;
                btn.onclick = () => { if(i===quiz[current].answer) score++; current++; showQuestion(); };
                container.appendChild(btn);
            });
        }
        showQuestion(); modalBody.appendChild(container);
    }

    if(type === 'sheet'){
        const container = document.createElement('div'); container.className='spreadsheet';
        let cells = [];
        for(let i=0;i<9;i++){
            const input = document.createElement('input'); input.type='number'; input.value='0';
            container.appendChild(input); cells.push(input);
        }
        const sumBtn = document.createElement('button'); sumBtn.innerText='Calculate Sum';
        sumBtn.onclick = ()=>{ let sum=0; cells.forEach(c=>sum+=parseFloat(c.value)||0); alert('Sum: '+sum); };
        const avgBtn = document.createElement('button'); avgBtn.innerText='Calculate Average';
        avgBtn.onclick = ()=>{ let sum=0; cells.forEach(c=>sum+=parseFloat(c.value)||0); alert('Average: '+(sum/cells.length)); };
        container.appendChild(sumBtn); container.appendChild(avgBtn); modalBody.appendChild(container);
    }

    if(type === 'profile'){
        const container = document.createElement('div'); container.className='profile-maker';
        const nameInput = document.createElement('input'); nameInput.placeholder='Name';
        const roleInput = document.createElement('input'); roleInput.placeholder='Role';
        const skillInput = document.createElement('input'); skillInput.placeholder='Skills';
        const addBtn = document.createElement('button'); addBtn.innerText='Add Profile';
        const list = document.createElement('div'); list.style.marginTop='15px';
        addBtn.onclick = ()=>{
            const card = document.createElement('div'); card.className='profile-card';
            card.innerHTML=`<h4>${nameInput.value}</h4><p>${roleInput.value}</p><p>Skills: ${skillInput.value}</p>`;
            list.appendChild(card); nameInput.value=''; roleInput.value=''; skillInput.value='';
        };
        container.append(nameInput, roleInput, skillInput, addBtn, list); modalBody.appendChild(container);
    }

    modal.style.display='block';
}

function closeModal(){ modal.style.display='none'; }
window.onclick = (e) => { if(e.target==modal){ closeModal(); } };
</script>
