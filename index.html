<script>
const modal = document.getElementById('projectModal');
const modalTitle = document.getElementById('modalTitle');
const modalBody = document.getElementById('modalBody');

function openModal(title, isCalc=false,isTic=false,isPass=false,isQuiz=false,isSheet=false,isProfile=false){
    modalTitle.innerText = title;
    modalBody.innerHTML = '';

    if(isCalc){
        const input = document.createElement('input'); input.type='text'; input.id='calcInput'; input.placeholder='0';
        const keys=['7','8','9','/','4','5','6','*','1','2','3','-','0','.','=','+'];
        const container = document.createElement('div'); container.className='calculator';
        container.appendChild(input);
        keys.forEach(k=>{
            const btn=document.createElement('button');
            btn.innerText=k;
            btn.onclick=()=>{ if(k==='='){ try{ input.value=eval(input.value); }catch(e){ input.value='Error';} }else{ input.value+=k; } };
            container.appendChild(btn);
        });
        modalBody.appendChild(container);
    }

    if(isTic){
        const board=document.createElement('div'); board.className='tic-tac-toe';
        let turn='X';
        for(let i=0;i<9;i++){
            let btn=document.createElement('button');
            btn.onclick=function(){ if(btn.innerText==''){btn.innerText=turn; turn=turn==='X'?'O':'X'; }};
            board.appendChild(btn);
        }
        modalBody.appendChild(board);
    }

    if(isPass){
        const btn=document.createElement('button'); btn.innerText='Generate Password';
        const output=document.createElement('p'); output.style.marginTop='15px';
        btn.onclick=()=>{ const chars='abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()'; let pw=''; for(let i=0;i<12;i++){ pw+=chars[Math.floor(Math.random()*chars.length)]; } output.innerText=pw; }
        modalBody.appendChild(btn); modalBody.appendChild(output);
    }

    if(isQuiz){
        const quiz=[{q:"What does Python mainly do?",options:["Cooking","Programming","Painting","Dancing"],answer:1},{q:"What is a common cybersecurity practice?",options:["Strong passwords","Sharing passwords","Ignoring updates","Clicking unknown links"],answer:0},{q:"Which tag is used for a paragraph in HTML?",options:["<p>","<div>","<h1>","<span>"],answer:0}];
        let current=0; let score=0;
        const container=document.createElement('div'); container.className='quiz-container';
        const showQuestion=()=>{
            container.innerHTML='';
            if(current>=quiz.length){ container.innerHTML=`<h4>Quiz Complete! Score: ${score}/${quiz.length}</h4>`; return; }
            const q=document.createElement('p'); q.innerText=quiz[current].q; container.appendChild(q);
            quiz[current].options.forEach((opt,i)=>{
                const btn=document.createElement('button'); btn.innerText=opt; 
                btn.onclick=function(){ if(i===quiz[current].answer){ alert('Correct!'); score++; } else{ alert('Wrong!'); } current++; showQuestion(); };
                container.appendChild(btn);
            });
        }
        showQuestion(); modalBody.appendChild(container);
    }

    if(isSheet){
        const container=document.createElement('div'); container.className='spreadsheet';
        let cells=[]; for(let i=0;i<9;i++){ const input=document.createElement('input'); input.type='number'; input.value='0'; container.appendChild(input); cells.push(input); }
        const sumBtn=document.createElement('button'); sumBtn.innerText='Calculate Sum'; sumBtn.onclick=()=>{ let sum=0; cells.forEach(c=>sum+=parseFloat(c.value)||0); alert('Sum: '+sum); };
        const avgBtn=document.createElement('button'); avgBtn.innerText='Calculate Average'; avgBtn.onclick=()=>{ let sum=0; cells.forEach(c=>sum+=parseFloat(c.value)||0); alert('Average: '+(sum/cells.length)); };
        container.appendChild(sumBtn); container.appendChild(avgBtn); modalBody.appendChild(container);
    }

    if(isProfile){
        const container=document.createElement('div'); container.className='profile-maker';
        const nameInput=document.createElement('input'); nameInput.placeholder='Name';
        const roleInput=document.createElement('input'); roleInput.placeholder='Role';
        const skillInput=document.createElement('input'); skillInput.placeholder='Skill';
        const addBtn=document.createElement('button'); addBtn.innerText='Add Profile';
        const list=document.createElement('div'); list.style.marginTop='15px';
        addBtn.onclick=()=>{
            const card=document.createElement('div'); card.className='profile-card';
            card.innerHTML=`<h4>${nameInput.value}</h4><p>${roleInput.value}</p><p>Skills: ${skillInput.value}</p>`;
            list.appendChild(card);
            nameInput.value=''; roleInput.value=''; skillInput.value='';
        };
        container.appendChild(nameInput); container.appendChild(roleInput); container.appendChild(skillInput); container.appendChild(addBtn); container.appendChild(list);
        modalBody.appendChild(container);
    }

    // THIS WAS MISSING
    modal.style.display = "block";
}

// THIS WAS MISSING
function closeModal(){
    modal.style.display = "none";
}

// Optional but safe (doesn't affect anything else)
window.onclick = function(event){
    if(event.target === modal){
        closeModal();
    }
}
</script>
